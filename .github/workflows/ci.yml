name: C++ CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ python3-pip
          sudo pip install --ignore-installed conan

      - name: Configure Conan
        run: conan install ${{ github.workspace }} --output-folder=build --build=missing --settings=build_type=Debug

      - name: Configure CMake
        run: cmake .

      - name: Build project
        run: cmake . --build build

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure --build-config Debug